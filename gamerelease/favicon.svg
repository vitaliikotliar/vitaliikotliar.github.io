  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- controller body -->
  <rect x="5" y="11" width="22" height="13" rx="5" fill="white" opacity="0.95"/>
  <!-- left handle -->
  <rect x="5" y="19" width="8" height="7" rx="3" fill="white" opacity="0.95"/>
  <!-- right handle -->
  <rect x="19" y="19" width="8" height="7" rx="3" fill="white" opacity="0.95"/>
  <!-- d-pad horizontal -->
  <rect x="8" y="15.5" width="6" height="2.5" rx="1" fill="#1a56db"/>
  <!-- d-pad vertical -->
  <rect x="10" y="13.5" width="2.5" height="6" rx="1" fill="#1a56db"/>
  <!-- face buttons -->
  <circle cx="21" cy="15" r="1.3" fill="#0ea5e9"/>
  <circle cx="24" cy="17" r="1.3" fill="#0ea5e9"/>
  <circle cx="21" cy="19" r="1.3" fill="#0ea5e9"/>
  <circle cx="18" cy="17" r="1.3" fill="#0ea5e9"/>
</svg>
